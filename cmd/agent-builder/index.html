<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botson-ADK Agent Builder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside>
      <div class="brand">Botson ADK</div>

      <button class="btn-create" onclick="openNewAgentForm()">
        + Create Agent
      </button>

      <div class="agent-section">
        <div class="section-title">Agents & Sub-Agents</div>
        <ul class="agent-list" id="agentList">
          <!-- Dynamically filled list -->
        </ul>
      </div>
    </aside>

    <!-- Workspace -->
    <main id="workspace">
      <div class="welcome-container">
        <div class="welcome-card" style="text-align: center;">
          <h2>Agent Builder Dashboard</h2>
          <p>Create and orchestrate agents. Add custom prompts, link tools, and wire up sub-agent delegation. Saving changes automatically updates your local <code>~/.botsonv2/agents/</code> directory.</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
