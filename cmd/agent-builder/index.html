<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botson-ADK Agent Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --accent-hover: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
      --error-bg: rgba(239, 68, 68, 0.2);
      --error-border: rgba(239, 68, 68, 0.4);
      --success-bg: rgba(16, 185, 129, 0.2);
      --success-border: rgba(16, 185, 129, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Container layout */
    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Sidebar Styling */
    aside {
      width: 320px;
      background: var(--glass-bg);
      border-right: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-create {
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 15px;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    .btn-create:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .agent-section {
      margin-bottom: 24px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .agent-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateX(4px);
    }

    .agent-item.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: #6366f1;
    }

    .agent-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agent-name {
      font-weight: 600;
      font-size: 15px;
    }

    .agent-desc-short {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }

    .badge.read-only {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      padding: 4px;
    }

    .btn-delete:hover {
      opacity: 1;
    }

    /* Main Workspace Panel */
    main {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }

    /* Welcome Dash */
    .welcome-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      text-align: center;
      gap: 16px;
    }

    .welcome-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      padding: 48px;
      border-radius: 24px;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .welcome-card h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-card p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Form Container */
    .editor-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 16px;
    }

    .editor-title {
      font-size: 22px;
      font-weight: 700;
    }

    .read-only-alert {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 12px 16px;
      border-radius: 12px;
      color: #818cf8;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Inputs fields styling */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    input[type="text"], textarea {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #6366f1;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    input:disabled, textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    /* Toggle Switches */
    .toggle-row {
      display: flex;
      gap: 40px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      padding: 16px;
      border-radius: 16px;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .toggle-item input[type="checkbox"] {
      display: none;
    }

    .toggle-slider {
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      position: relative;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.3s;
    }

    .toggle-item input:checked + .toggle-slider {
      background: #6366f1;
    }

    .toggle-item input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    /* Tools Selection */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      padding: 16px;
      border-radius: 16px;
    }

    .tool-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .tool-checkbox input {
      accent-color: #6366f1;
      width: 16px;
      height: 16px;
    }

    /* Form Actions */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      border-top: 1px solid var(--glass-border);
      padding-top: 24px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-save {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.2);
    }

    .btn-save:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toasts/Notifications */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1000;
    }

    .toast {
      padding: 16px 24px;
      border-radius: 12px;
      color: var(--text-main);
      font-weight: 550;
      font-size: 14px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease forwards;
    }

    .toast.success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
    }

    .toast.error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside>
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#accentGrad)" stroke-width="2.5"/>
          <path d="M7 11V13M12 9V15M17 11V13" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="accentGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
        Botson ADK
      </div>

      <button class="btn-create" onclick="openNewAgentForm()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Create Agent
      </button>

      <div class="agent-section">
        <div class="section-title">Agents & Sub-Agents</div>
        <ul class="agent-list" id="agentList">
          <!-- Dynamically filled list -->
        </ul>
      </div>
    </aside>

    <!-- Workspace -->
    <main id="workspace">
      <div class="welcome-container">
        <div class="welcome-card">
          <h2>Agent Builder Dashboard</h2>
          <p>Create and orchestrate agents. Add custom prompts, link tools, and wire up sub-agent delegation. Saving changes automatically updates your local <code>~/.botsonv2/agents/</code> directory.</p>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let allAgents = [];
    let allTools = { standard: [], agents: [] };
    let currentAgent = null;

    // Load initial data
    window.addEventListener('DOMContentLoaded', async () => {
      await loadTools();
      await loadAgents();
    });

    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error('Failed to load agents list');
        allAgents = await res.json();
        renderSidebar();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadTools() {
      try {
        const res = await fetch('/api/tools');
        if (!res.ok) throw new Error('Failed to load tools list');
        allTools = await res.json();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderSidebar() {
      const listEl = document.getElementById('agentList');
      listEl.innerHTML = '';

      allAgents.forEach(agent => {
        const li = document.createElement('li');
        li.className = `agent-item ${currentAgent && currentAgent.name === agent.name ? 'active' : ''}`;
        li.onclick = () => selectAgent(agent);

        li.innerHTML = `
          <div class="agent-info">
            <div class="agent-name">${agent.name}</div>
            <div class="agent-desc-short">${agent.description || 'No description'}</div>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="badge ${agent.read_only ? 'read-only' : ''}">${agent.read_only ? 'Default' : 'Custom'}</span>
            ${!agent.read_only ? `
              <button class="btn-delete" onclick="deleteAgent(event, '${agent.name}')">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            ` : ''}
          </div>
        `;
        listEl.appendChild(li);
      });
    }

    function selectAgent(agent) {
      currentAgent = agent;
      renderSidebar();
      renderForm(agent);
    }

    function openNewAgentForm() {
      currentAgent = null;
      renderSidebar();
      renderForm({
        name: '',
        description: '',
        is_root: false,
        private: false,
        tools: [],
        instructions: '',
        read_only: false
      });
    }

    function renderForm(agentData) {
      const isEdit = agentData.name !== '';
      const workspace = document.getElementById('workspace');

      // Create checkbox lists for tools
      // Do not list yourself as a delegatable subagent
      const filteredSubagents = allTools.agents.filter(a => a !== agentData.name);

      let toolsHTML = '';
      
      // Standard Tools Section
      toolsHTML += '<div class="field-group" style="grid-column: 1 / -1;"><label>Standard Tools</label><div class="tools-grid">';
      allTools.standard.forEach(tool => {
        const checked = agentData.tools && agentData.tools.includes(tool) ? 'checked' : '';
        const disabled = agentData.read_only ? 'disabled' : '';
        toolsHTML += `
          <label class="tool-checkbox">
            <input type="checkbox" name="agent_tools" value="${tool}" ${checked} ${disabled}>
            ${tool}
          </label>
        `;
      });
      toolsHTML += '</div></div>';

      // Sub-Agents delegation Section
      if (filteredSubagents.length > 0) {
        toolsHTML += '<div class="field-group" style="grid-column: 1 / -1;"><label>Sub-Agent Delegation</label><div class="tools-grid">';
        filteredSubagents.forEach(sub => {
          const checked = agentData.tools && agentData.tools.includes(sub) ? 'checked' : '';
          const disabled = agentData.read_only ? 'disabled' : '';
          toolsHTML += `
            <label class="tool-checkbox">
              <input type="checkbox" name="agent_tools" value="${sub}" ${checked} ${disabled}>
              ${sub}
            </label>
          `;
        });
        toolsHTML += '</div></div>';
      }

      workspace.innerHTML = `
        <div class="editor-container">
          <div class="editor-header">
            <h3 class="editor-title">${isEdit ? `Edit Agent: ${agentData.name}` : 'Create New Agent'}</h3>
            <span class="badge ${agentData.read_only ? 'read-only' : ''}">${agentData.read_only ? 'Default Agent' : 'Custom Agent'}</span>
          </div>

          ${agentData.read_only ? `
            <div class="read-only-alert">
              <strong>Notice:</strong> This is a compiled-in default agent and cannot be edited or deleted directly. To customize it, create a custom agent with the same name. It will override the default configuration.
            </div>
          ` : ''}

          <div class="field-row">
            <div class="field-group">
              <label for="agentName">Agent Name (Unique ID)</label>
              <input type="text" id="agentName" value="${agentData.name}" placeholder="e.g. general_assistant" ${isEdit || agentData.read_only ? 'disabled' : ''}>
            </div>
            <div class="field-group">
              <label for="agentDesc">Description</label>
              <input type="text" id="agentDesc" value="${agentData.description}" placeholder="e.g. A general helper agent" ${agentData.read_only ? 'disabled' : ''}>
            </div>
          </div>

          <div class="toggle-row">
            <label class="toggle-item">
              <input type="checkbox" id="agentIsRoot" ${agentData.is_root ? 'checked' : ''} ${agentData.read_only ? 'disabled' : ''}>
              <div class="toggle-slider"></div>
              <span>Is Root Agent (Default Launch)</span>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="agentIsPrivate" ${agentData.private ? 'checked' : ''} ${agentData.read_only ? 'disabled' : ''}>
              <div class="toggle-slider"></div>
              <span>Private (Hide from Web UI selector)</span>
            </label>
          </div>

          ${toolsHTML}

          <div class="field-group">
            <label for="agentInstructions">Instructions (System Prompt - Markdown)</label>
            <textarea id="agentInstructions" placeholder="You are a polite assistant..." ${agentData.read_only ? 'disabled' : ''}>${agentData.instructions || ''}</textarea>
          </div>

          <div class="form-actions">
            <button class="btn btn-secondary" onclick="openNewAgentForm()" ${agentData.read_only ? 'disabled' : ''}>Cancel</button>
            <button class="btn btn-save" onclick="saveAgent()" ${agentData.read_only ? 'disabled' : ''}>Save Agent</button>
          </div>
        </div>
      `;
    }

    async function saveAgent() {
      const nameEl = document.getElementById('agentName');
      const descEl = document.getElementById('agentDesc');
      const isRootEl = document.getElementById('agentIsRoot');
      const isPrivateEl = document.getElementById('agentIsPrivate');
      const instEl = document.getElementById('agentInstructions');
      
      const selectedTools = [];
      document.querySelectorAll('input[name="agent_tools"]:checked').forEach(cb => {
        selectedTools.push(cb.value);
      });

      const payload = {
        name: nameEl.value,
        description: descEl.value,
        is_root: isRootEl.checked,
        private: isPrivateEl.checked,
        tools: selectedTools,
        instructions: instEl.value
      };

      try {
        const res = await fetch('/api/agents', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errMsg = await res.text();
          throw new Error(errMsg || 'Failed to save agent');
        }

        showToast('Agent saved successfully!', 'success');
        
        // Reload tools list (since a new agent can now be a subagent tool)
        await loadTools();
        await loadAgents();

        // Select the newly saved agent
        const matched = allAgents.find(a => a.name === payload.name);
        if (matched) selectAgent(matched);

      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteAgent(event, name) {
      event.stopPropagation(); // Avoid triggering list select

      if (!confirm(`Are you sure you want to delete "${name}"? This cannot be undone.`)) {
        return;
      }

      try {
        const res = await fetch(`/api/agents/${name}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const errMsg = await res.text();
          throw new Error(errMsg || 'Failed to delete agent');
        }

        showToast('Agent deleted successfully', 'success');
        
        if (currentAgent && currentAgent.name === name) {
          currentAgent = null;
          document.getElementById('workspace').innerHTML = `
            <div class="welcome-container">
              <div class="welcome-card">
                <h2>Agent Builder Dashboard</h2>
                <p>Create and orchestrate agents. Add custom prompts, link tools, and wire up sub-agent delegation. Saving changes automatically updates your local <code>~/.botsonv2/agents/</code> directory.</p>
              </div>
            </div>
          `;
        }

        await loadTools();
        await loadAgents();

      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerText = message;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>
</body>
</html>
